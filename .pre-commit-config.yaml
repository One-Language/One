---
default_stages: [pre-commit, pre-push]
default_language_version:
  python: python3
repos:
  - repo: meta
    hooks:
      - id: identity
      - id: check-hooks-apply
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-tabs
        exclude: \.c$|\.h$|\.one$|Makefile$|^src/ast/ast-structure\.txt$
      - id: remove-tabs
        exclude: \.c$|\.h$|\.one$|Makefile$|^src/ast/ast-structure\.txt$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: file-contents-sorter
        name: run file-contents-sorter
        description: sort the lines in specified files (defaults to alphabetical)
        args: [--unique]
        files: ^\.github/linters/codespell\.txt$
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: run codespell
        description: Check spelling with codespell
        args: [--ignore-words=.github/linters/codespell.txt]
        exclude: ^docs/.*$
  # - repo: https://github.com/jumanjihouse/pre-commit-hooks
  #  rev: 2.1.5
  #  hooks:
  # - id: shellcheck
  # - id: shfmt
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--config=.github/linters/mlc_config.json, -q]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: run markdownlint
        description: Check Markdown files with markdownlint
        args: [--config=.github/linters/.markdown-lint.yml]
        exclude: ^\.github/.*$
        types: [markdown]
        files: \.md$
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: run yamllint
        description: Check YAML files with yamllint
        args: [--strict, -c=.github/linters/.yaml-lint.yml]
        types: [yaml]
        files: \.ya?ml$
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        name: run Clang Format
        description: Format files with Clang Format
        args: [-i, --style=file]
  - repo: local
    hooks:
      - id: hadolint-docker
        name: lint Dockerfiles
        description: Runs hadolint Docker image to lint Dockerfiles
        language: docker_image
        types: ['dockerfile']
        entry: ghcr.io/hadolint/hadolint:v2.12.0 hadolint -c .github/linters/.hadolint.yaml
        files: ^Dockerfile$
      - id: shellcheck
        name: lint Shell scripts
        description: Check Shell scripts for correct syntax
        language: docker_image
        entry: koalaman/shellcheck:v0.9.0 -a
        files: \.(bash|sh)$
        require_serial: true
