# https://docs.github.com/en/code-security/concepts/supply-chain-security/about-dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
